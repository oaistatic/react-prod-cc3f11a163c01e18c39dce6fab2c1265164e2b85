<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>PPTX Preview</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: #ffffff;
        color: #0f172a;
      }

      body {
        overflow: hidden;
      }

      .shell {
        display: flex;
        height: 100%;
        width: 100%;
        flex-direction: column;
      }

      .hidden {
        display: none !important;
      }

      .loading,
      .error {
        display: flex;
        height: 100%;
        width: 100%;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .spinner {
        height: 28px;
        width: 28px;
        border: 3px solid rgba(15, 23, 42, 0.12);
        border-top-color: rgba(15, 23, 42, 0.72);
        border-radius: 999px;
        animation: spin 0.8s linear infinite;
      }

      .error-card {
        display: flex;
        max-width: 420px;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        text-align: center;
      }

      .error-message {
        margin: 0;
        font-size: 14px;
        line-height: 20px;
      }

      .retry-button {
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 999px;
        background: #ffffff;
        color: #0f172a;
        cursor: pointer;
        font: inherit;
        padding: 8px 16px;
      }

      .viewer {
        flex: 1;
        min-height: 0;
        overflow-x: auto;
        overflow-y: auto;
      }

      .viewer-content {
        margin: 0 auto;
        display: flex;
        width: 100%;
        max-width: 1400px;
        flex-direction: column;
        gap: 16px;
        padding: 12px 12px 24px;
      }

      .slide-card {
        overflow: hidden;
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
      }

      .slide-card header {
        border-bottom: 1px solid rgba(15, 23, 42, 0.12);
        background: #f8fafc;
        padding: 8px 16px;
      }

      .slide-card p {
        margin: 0;
        color: #475569;
        font-size: 12px;
        font-weight: 500;
      }

      .slide-frame {
        display: flex;
        justify-content: center;
        overflow-x: auto;
        background: rgba(15, 23, 42, 0.05);
        padding: 12px;
      }

      .slide-frame img {
        margin: 0;
        max-width: 100%;
        border-radius: 6px;
        background: #ffffff;
        object-fit: contain;
      }

      .empty-state,
      .limit-note {
        color: #475569;
        text-align: center;
      }

      .empty-state {
        padding: 8px 0;
        font-size: 14px;
      }

      .limit-note {
        padding: 0 4px;
        font-size: 12px;
      }

      @media (min-width: 640px) {
        .viewer-content {
          padding: 24px 24px 24px;
        }
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div id="loading" class="loading">
        <div class="spinner" aria-label="Loading"></div>
      </div>
      <div id="error" class="error hidden">
        <div class="error-card">
          <p id="error-message" class="error-message"></p>
          <button id="retry-button" class="retry-button hidden" type="button">
            Retry
          </button>
        </div>
      </div>
      <div id="viewer" class="viewer hidden">
        <div id="content" class="viewer-content"></div>
      </div>
    </div>
    <script>
      (() => {
        const loadingEl = document.getElementById("loading");
        const errorEl = document.getElementById("error");
        const errorMessageEl = document.getElementById("error-message");

        function showBootstrapError() {
          if (!loadingEl || !errorEl || !errorMessageEl) {
            return;
          }
          errorMessageEl.textContent = "Unable to load the file preview.";
          loadingEl.classList.add("hidden");
          errorEl.classList.remove("hidden");
        }

        async function loadThreeAndPreviewer() {
          try {
            window.THREE = await import(
              "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.min.js"
            );

            const previewerScript = document.createElement("script");
            previewerScript.src = "./pptx-previewer.js";
            previewerScript.onerror = () => {
              showBootstrapError();
            };
            document.body.appendChild(previewerScript);
          } catch {
            showBootstrapError();
          }
        }

        void loadThreeAndPreviewer();
      })();
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/mapbox-gl@3.14.0/dist/mapbox-gl.js"
      onerror="document.getElementById('error-message').textContent='Unable to load the file preview.'; document.getElementById('loading')?.classList.add('hidden'); document.getElementById('error')?.classList.remove('hidden');"
    ></script>

</html>
